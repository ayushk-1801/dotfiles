backend = "glx";
glx-no-stencil = true;
glx-copy-from-front = false;

# Opacity
active-opacity = 1;
inactive-opacity = 1;
frame-opacity = 1;
ianctive-opacity-override = false;
blur-background = true;
blur-background-exclude = [];

blur-method = "dual_kawase";
blur-strength = 6;

# Window Type Settings
opacity-rule = [
  "80:class_g = 'kitty'",
  "90:class_g = 'Rofi'"
];
