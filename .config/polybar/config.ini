[colors]
background = #0f161e
background-alt = #0f161e
foreground = #cfd0d2
primary = #fe646e
secondary = #8ABEB7
alert = #A54242
disabled = #707880
yellow = #fbe903
white = #cfd0d2

[bar/example]
width = 100%
height = 24pt
; radius = 6

; dpi = 96

enable-ipc = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

; border-size = 4pt
; border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = "JetBrainsMono Nerd Font;2"
font-1 = "Font Awesome 5 Free:size=10;1"
# modules-left = xworkspaces
modules-left = xworkspaces xwindow
# modules-center = spotify previous playpause next 
modules-center = date
modules-right = updates-pacman-aurhelper brightnessctl pulseaudio memory cpu system-nvidia-smi wlan eth battery-combined-udev

tray-position = none

cursor-click = pointer
cursor-scroll = ns-resize

; enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.yellow}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:30:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "ď¨  "
format-volume-prefix-foreground = #d4bbff
format-volume = <label-volume>
format-volume-foreground = #d4bbff

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = #aac7ff
label = %percentage_used:2%%
label-foreground = #aac7ff

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = #ffb1c0
label = %percentage:2%%
label-foreground = #ffb1c0

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>

[module/wlan]
inherit = network-base
interface-type = wireless
format-prefix = "ďŤ "
format-prefix-foreground = #25a0b8
label-connected-foreground = #2dce08
label-connected = ďŤ  %essid%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %ifname%%{F-}

[module/date]
type = internal/date
interval = 1

date-alt = %H:%M
date = %Y-%m-%d | %H:%M

label = %date%
label-foreground = #cfd0d2

[settings]
screenchange-reload = true
pseudo-transparency = true

; custom modules 
[module/updates]
type = custom/script
interval = 120
exec = tail -1 ~/.config/updates

[module/previous]
type = custom/ipc
format-font = 2
; Default
hook-0 = echo ""
; When spotify active
hook-1 = echo "ď"
click-left = "spotifyctl -q previous"


[module/next]
type = custom/ipc
format-font = 2
; Default
hook-0 = echo ""
; When spotify active
hook-1 = echo "ď"
click-left = "spotifyctl -q next"


[module/playpause]
type = custom/ipc
format-font = 2
; Default
hook-0 = echo ""
; Playing
hook-1 = echo "ď"
; Paused
hook-2 = echo "ď"
click-left = "spotifyctl -q playpause"


[module/spotify]
type = custom/ipc
; Default
label-foreground=#20d763
hook-0 = echo ""
format-prefix = "ďź "
format-prefix-foreground = #20d763
; Playing/paused show song name and artist
hook-1 = spotifyctl status --format '%title%' --max-length 20 --max-title-length 20 --trunc '...'

[module/brightnessctl]
type = custom/script
exec = ~/.config/scripts/brightnessctl.sh

scroll-up = exec brightnessctl set +5%
scroll-down = exec brightnessctl set 5%-
interval = 0.5

label = %output%
label-foreground = #dec663

[module/system-nvidia-smi]
type = custom/script
exec = ~/.config/scripts/gpu-usage.sh
interval = 10
label-foreground = #74d7cb

[module/updates-pacman-aurhelper]
type = custom/script
exec = ~/.config/scripts/updates-pacman-aurhelper.sh
interval = 600

[module/battery-combined-udev]
type = custom/script
exec = ~/.config/scripts/battery.sh
tail = true

[module/system-bluetooth-bluetoothctl]
type = custom/script
exec = ~/.config/scripts/bluetoothctl.sh
tail = true
click-left = ~/polybar-scripts/system-bluetooth-bluetoothctl.sh --toggle &

; vim:ft=dosini
